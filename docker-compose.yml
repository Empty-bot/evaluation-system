version: "3.8"

networks:
  # Réseau interne partagé entre tous les services
  # Permet aux containers de se parler par nom (ex: backend contacte "mysql")
  app-network:
    driver: bridge

volumes:
  # Volume persistant pour MySQL : les données survivent aux redémarrages
  mysql-data:

services:
  # ─── Base de données MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: evaluation-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persistance des données MySQL
      - mysql-data:/var/lib/mysql
      # Script d'initialisation : créé les tables au premier démarrage
      - ./backend/src/config/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      # Vérifie que MySQL est prêt à accepter des connexions avant de démarrer le backend
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Express ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evaluation-backend
    restart: unless-stopped
    # Charge toutes les variables d'environnement depuis .env
    env_file:
      - .env
    environment:
      # Surcharge DB_HOST : dans Docker, le backend contacte MySQL
      # via le nom du service "mysql" et non "localhost"
      DB_HOST: mysql
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        # Attend que le healthcheck MySQL soit "healthy" avant de démarrer
        condition: service_healthy
    networks:
      - app-network

  # ─── Frontend React (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Injecté au moment du build Vite (pas à l'exécution)
        # En local, le navigateur appelle le backend via localhost
        VITE_API_URL: http://localhost:3001
    container_name: evaluation-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
