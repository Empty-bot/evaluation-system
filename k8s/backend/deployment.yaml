apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-backend
  namespace: evaluation-system
spec:
  # 2 replicas : si un pod tombe, l'autre continue à servir les requêtes
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-backend
  strategy:
    # RollingUpdate : lors d'un déploiement, les nouveaux pods démarrent
    # avant que les anciens soient arrêtés — zéro downtime
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1 # Au maximum 1 pod supplémentaire pendant le déploiement
      maxUnavailable: 0 # Aucun pod indisponible pendant le déploiement
  template:
    metadata:
      labels:
        app: evaluation-backend
    spec:
      containers:
        - name: backend
          # L'image sera mise à jour par Jenkins à chaque build
          image: emptybot/evaluation-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            # DB_HOST pointe vers le Service MySQL via son nom DNS Kubernetes
            # Kubernetes résout automatiquement "evaluation-mysql" vers l'IP du pod MySQL
            - name: DB_HOST
              value: "evaluation-mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: JWT_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: EMAIL_PASS
            - name: SALT_SECRET
              valueFrom:
                secretKeyRef:
                  name: evaluation-secrets
                  key: SALT_SECRET
          # Vérifie que le backend répond avant d'envoyer du trafic
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          # Redémarre le container s'il ne répond plus du tout
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
