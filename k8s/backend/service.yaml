apiVersion: v1
kind: Service
metadata:
  name: evaluation-backend-service
  namespace: evaluation-system
spec:
  # LoadBalancer : AWS crée automatiquement un Elastic Load Balancer
  # avec une URL publique (ex: abc123.us-east-1.elb.amazonaws.com)
  # C'est cette URL que le frontend utilisera pour appeler l'API
  type: LoadBalancer
  selector:
    app: evaluation-backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
