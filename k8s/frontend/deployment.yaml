apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-frontend
  namespace: evaluation-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: evaluation-frontend
    spec:
      containers:
        - name: frontend
          image: emptybot/evaluation-frontend:latest
          ports:
            - containerPort: 80
          # Le frontend est statique (Nginx) — pas de variables d'environnement
          # à l'exécution car VITE_API_URL est embarquée dans le bundle JS au build
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
